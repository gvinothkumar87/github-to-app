[build]
  command = "npm run build"
  publish = "dist"

# GSP Sandbox E-Way Bill & E-Invoice unified endpoint proxy
[[redirects]]
  from = "/api-gsp-sandbox/*"
  to = "https://gstsandbox.charteredinfo.com/:splat"
  status = 200
  force = true
  headers = { Access-Control-Allow-Origin = "*" }

# GSP Production E-Invoice / E-Way Bill primary endpoint proxy
[[redirects]]
  from = "/api-gsp-prod-primary/*"
  to = "https://einvapi.charteredinfo.com/:splat"
  status = 200
  force = true
  headers = { Access-Control-Allow-Origin = "*" }

# GSP Production Backup 1 proxy
[[redirects]]
  from = "/api-gsp-prod-backup1/*"
  to = "https://einvapimum1.charteredinfo.com/:splat"
  status = 200
  force = true
  headers = { Access-Control-Allow-Origin = "*" }

# GSP Production Backup 2 proxy
[[redirects]]
  from = "/api-gsp-prod-backup2/*"
  to = "https://einvapidel2.charteredinfo.com/:splat"
  status = 200
  force = true
  headers = { Access-Control-Allow-Origin = "*" }

# SPA routing fallback for React Router (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
